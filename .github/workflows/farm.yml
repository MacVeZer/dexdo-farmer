name: DEX.DO Farmer

on:
  schedule:
    # Every 20 minutes — gives 5 min gap between runs (run timeout is 15 min)
    - cron: '*/20 * * * *'
  workflow_dispatch:

# Prevent overlapping runs (wallet nonce lock)
concurrency:
  group: dexdo-farmer-single
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  farm:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache tools
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/.local/bin
            /tmp/abi
            /tmp/contracts
          key: dexdo-tvm-tools-v2

      - name: Restore PN recovery state
        uses: actions/cache@v4
        with:
          path: |
            /tmp/pn_pool.json
            /tmp/pn_pool.json.recovery.json
          key: pn-recovery-state
          restore-keys: |
            pn-recovery-state

      - name: Prepare dirs
        run: |
          mkdir -p $HOME/.local/bin /tmp/abi /tmp/contracts
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Write wallet seed
        env:
          WALLET_SEED: ${{ secrets.WALLET_SEED }}
        run: |
          printf '%s\n' "$WALLET_SEED" > /tmp/wallet.seed
          chmod 600 /tmp/wallet.seed

      - name: Run one farm cycle
        env:
          WALLET_ADDR: ${{ secrets.WALLET_ADDR }}
          WALLET_SEED_FILE: /tmp/wallet.seed
          DEST_WALLET: ${{ secrets.DEST_WALLET }}
          PN_POOL: /tmp/pn_pool.json
          LOG_FILE: /tmp/cycle.log
        run: |
          bash cycle.sh
          if [ -f /tmp/cycle.log ]; then
            echo "### Cycle log" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -50 /tmp/cycle.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Append log to history (commit)
        if: always()
        run: |
          git config user.email "farmer@dexdo.local"
          git config user.name "dexdo-farmer"
          mkdir -p logs
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          if [ -f /tmp/cycle.log ]; then
            cp /tmp/cycle.log "logs/cycle_${TS}.log"
            ls -t logs/cycle_*.log 2>/dev/null | tail -n +51 | xargs -r rm
            git add -f logs/
            git commit -m "cycle ${TS}" || echo "nothing to commit"
            git push || echo "push failed (non-fatal)"
          fi

      - name: Save PN recovery state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            /tmp/pn_pool.json
            /tmp/pn_pool.json.recovery.json
          key: pn-recovery-state-${{ github.run_id }}-${{ github.run_attempt }}
